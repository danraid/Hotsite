name: Hotsite CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting (Prettier)
        run: npm run format:check

      - name: Lint Code (ESLint)
        run: npm run lint

      - name: Check Types (TypeScript/Astro)
        run: npm run typecheck

      - name: Run Unit Tests (Vitest)
        run: npm run test

      - name: Build Application (Astro Build)
        run: npm run build
