# Common security headers for the Janaína Hollanda hotsite (SPEC-013).
# Include inside the server {} block serving static files from dist/.
# CSP is provided by a separate include — see README.md for provider mapping.

server_tokens off;

add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), cross-origin-isolated=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), usb=(), web-share=()" always;
add_header X-Frame-Options "DENY" always;
