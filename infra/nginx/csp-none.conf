# CSP baseline for analytics.provider: none (SPEC-013 / SEC-002).
# Enforce mode — use Content-Security-Policy-Report-Only during staging rollout if needed.

add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; upgrade-insecure-requests" always;
