# CSP for analytics.provider: plausible (SPEC-013 / SEC-002).
# Requires consent before Plausible loads (SPEC-012).

add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://plausible.io; connect-src 'self' https://plausible.io; upgrade-insecure-requests" always;
